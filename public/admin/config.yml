backend:
  name: github
  repo: kis444/psy
  branch: main
  site_domain: localhost:3000

local_backend: true
media_folder: public/images
public_folder: /images

collections:
  # SERVICES - array direct în services.json
  - name: "services"
    label: "Services"
    folder: "content/cms"
    create: false
    slug: "services"
    fields:
      - label: "Services List"
        name: "services"
        widget: "list"
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "Title (EN)", name: "title_en", widget: "string" }
          - { label: "Title (RO)", name: "title_ro", widget: "string" }
          - { label: "Title (RU)", name: "title_ru", widget: "string" }
          - { label: "Description (EN)", name: "description_en", widget: "text" }
          - { label: "Description (RO)", name: "description_ro", widget: "text" }
          - { label: "Description (RU)", name: "description_ru", widget: "text" }
          - { label: "Price", name: "price", widget: "number" }
          - { label: "Currency", name: "currency", widget: "string" }
          - { label: "Duration", name: "duration", widget: "string" }
          - { label: "Mode", name: "mode", widget: "select", options: ["online", "offline", "online & offline"] }
          - { label: "Featured", name: "featured", widget: "boolean", default: false }

  # HERO - obiect în hero.json
  - name: "hero"
    label: "Hero Section"
    folder: "content/cms"
    create: false
    slug: "hero"
    fields:
      - { label: "Welcome Text (EN)", name: "welcome_en", widget: "string" }
      - { label: "Welcome Text (RO)", name: "welcome_ro", widget: "string" }
      - { label: "Welcome Text (RU)", name: "welcome_ru", widget: "string" }
      - { label: "Title (EN)", name: "title_en", widget: "string" }
      - { label: "Title (RO)", name: "title_ro", widget: "string" }
      - { label: "Title (RU)", name: "title_ru", widget: "string" }
      - { label: "Description (EN)", name: "description_en", widget: "text" }
      - { label: "Description (RO)", name: "description_ro", widget: "text" }
      - { label: "Description (RU)", name: "description_ru", widget: "text" }

  # TESTIMONIALS - array direct în testimonials.json
  - name: "testimonials"
    label: "Testimonials"
    folder: "content/cms"
    create: false
    slug: "testimonials"
    fields:
      - label: "Testimonials List"
        name: "testimonials"
        widget: "list"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Text (EN)", name: "text_en", widget: "text" }
          - { label: "Text (RO)", name: "text_ro", widget: "text" }
          - { label: "Text (RU)", name: "text_ru", widget: "text" }
          - { label: "Rating", name: "rating", widget: "number", min: 1, max: 5 }

  # ABOUT - obiect în about.json
  - name: "about"
    label: "About Page"
    folder: "content/cms"
    create: false
    slug: "about"
    fields:
      - { label: "Title (EN)", name: "title_en", widget: "string" }
      - { label: "Title (RO)", name: "title_ro", widget: "string" }
      - { label: "Title (RU)", name: "title_ru", widget: "string" }
      - { label: "Content (EN)", name: "content_en", widget: "markdown" }
      - { label: "Content (RO)", name: "content_ro", widget: "markdown" }
      - { label: "Content (RU)", name: "content_ru", widget: "markdown" }

  # BLOG - articole multiple
  - name: "blog"
    label: "Blog Posts"
    folder: "content/cms/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Slug (URL)", name: "slug", widget: "string" }
      - { label: "Title (EN)", name: "title_en", widget: "string" }
      - { label: "Title (RO)", name: "title_ro", widget: "string" }
      - { label: "Title (RU)", name: "title_ru", widget: "string" }
      - { label: "Excerpt (EN)", name: "excerpt_en", widget: "text" }
      - { label: "Excerpt (RO)", name: "excerpt_ro", widget: "text" }
      - { label: "Excerpt (RU)", name: "excerpt_ru", widget: "text" }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Body (EN)", name: "body_en", widget: "markdown" }
      - { label: "Body (RO)", name: "body_ro", widget: "markdown" }
      - { label: "Body (RU)", name: "body_ru", widget: "markdown" }